name: Build and Release Book

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Runner Environment
        run: |
          echo "=== Runner Debug Information ==="
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Runner Name: $RUNNER_NAME"
          echo ""
          echo "=== Current PATH ==="
          echo "$PATH" | tr ':' '\n'
          echo ""
          echo "=== Environment Variables (selected) ==="
          env | grep -E '(HOME|GITHUB|RUNNER|PATH|USER)' | sort
          echo ""
          echo "=== Checking for common TeX Live locations ==="
          ls -la /usr/local/texlive 2>/dev/null || echo "No /usr/local/texlive"
          ls -la ~/texlive 2>/dev/null || echo "No ~/texlive"
          which tex 2>/dev/null || echo "No 'tex' in PATH"
          which xelatex 2>/dev/null || echo "No 'xelatex' in PATH"
          which latexmk 2>/dev/null || echo "No 'latexmk' in PATH"
          echo ""
          echo "=== Disk space ==="
          df -h
          echo ""
          echo "=== apt sources (for debugging) ==="
          cat /etc/apt/sources.list | head -20

      - name: Install TeX Live (official installer, user-local)
        run: |
          echo "=== Installing TeX Live via official installer (user home) ==="
          # Download and extract the installer
          wget -qO- https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz | tar -xz
          cd install-tl-*

          # Install into user home (no sudo needed)
          TEXLIVE_INSTALL_DIR="$HOME/texlive"

          ./install-tl --no-interaction \
            --scheme=medium \
            --texdir="$TEXLIVE_INSTALL_DIR" \
            --no-doc-install \
            --no-src-install

          # Add to PATH for current and future steps
          echo "$TEXLIVE_INSTALL_DIR/bin/x86_64-linux" >> $GITHUB_PATH
          export PATH="$TEXLIVE_INSTALL_DIR/bin/x86_64-linux:$PATH"

          echo "TeX Live installed to: $TEXLIVE_INSTALL_DIR"
          echo "PATH now contains TeX binaries"

          # Install additional packages we need
          tlmgr install \
            latexmk xetex fontspec titlesec setspace microtype parskip \
            xcolor tocloft geometry kvoptions ltxcmds kvsetkeys mdframed \
            zref needspace hyperref fancyhdr

          # Verify installation
          echo "=== TeX verification ==="
          which xelatex
          which latexmk
          xelatex --version | head -2

      - name: Install Pandoc
        run: |
          echo "Installing Pandoc..."
          PANDOC_VERSION="3.4"
          wget -q https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb -O pandoc.deb || \
          wget -q https://github.com/jgm/pandoc/releases/download/3.5/pandoc-3.5-1-amd64.deb -O pandoc.deb
          sudo dpkg -i pandoc.deb
          rm -f pandoc.deb
          pandoc --version || echo "Pandoc installation may have issues"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-roboto || sudo apt-get install -y fonts-roboto fonts-roboto-unhinted

      - name: Compile LaTeX to PDF with XeLaTeX
        run: |
          # TeX Live is installed user-locally at $HOME/texlive
          export PATH="$HOME/texlive/bin/x86_64-linux:$PATH"
          which xelatex
          latexmk -pdf -xelatex -interaction=nonstopmode -f book_wmd_to_glitch.tex
        
      - name: Generate HTML with Pandoc
        run: |
          pandoc -s book_wmd_to_glitch.tex -o book_wmd_to_glitch-${{ github.ref_name }}.html

      - name: Generate EPUB with Pandoc
        run: |
          pandoc -s book_wmd_to_glitch.tex -o book_wmd_to_glitch-${{ github.ref_name }}.epub

      - name: Generate FB2 with Pandoc
        run: |
          pandoc -s book_wmd_to_glitch.tex -o book_wmd_to_glitch-${{ github.ref_name }}.fb2

      - name: Install Calibre
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre

      - name: Convert EPUB to MOBI
        run: |
          ebook-convert book_wmd_to_glitch-${{ github.ref_name }}.epub book_wmd_to_glitch-${{ github.ref_name }}.mobi

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            book_wmd_to_glitch.pdf
            book_wmd_to_glitch-${{ github.ref_name }}.html
            book_wmd_to_glitch-${{ github.ref_name }}.epub
            book_wmd_to_glitch-${{ github.ref_name }}.fb2
            book_wmd_to_glitch-${{ github.ref_name }}.mobi